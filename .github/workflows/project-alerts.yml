name: Project Alerts

# Valuta le regole di alert su TUTTI i project dell'org che hanno il campo "🚨 Alert"
# e aggiorna il valore su ogni item. Pensato per girare nel repo agic-sandbox/.github.
on:
  schedule:
    - cron: '0 6 * * *'   # ogni giorno alle 06:00 UTC
    - cron: '0 12 * * *'  # ogni giorno alle 12:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'run-all (tutti i project) | run (un solo project, richiede project_number)'
        required: false
        default: 'run-all'
      project_number:
        description: 'Numero del project (solo se mode=run)'
        required: false
      dry_run:
        description: 'Esegui senza scrivere (true/false)'
        required: false
        default: 'false'

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run project alerts
        env:
          # PAT classico con scope "project" + "read:org". NON usare GITHUB_TOKEN: non puo' scrivere i project org.
          GITHUB_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER || 'agic-sandbox' }}
          PROJECT_NUMBER: ${{ github.event.inputs.project_number }}
          OWNER_TYPE: ${{ vars.OWNER_TYPE || 'organization' }}
        run: |
          MODE="${{ github.event.inputs.mode || 'run-all' }}"
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          node scripts/project-alerts.mjs "$MODE" $DRY
