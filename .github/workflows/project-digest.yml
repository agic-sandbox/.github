name: Project Digest

# Pubblica una "Project status update" settimanale su ogni progetto Scrum dell'org.
on:
  schedule:
    - cron: '0 7 * * 1'   # ogni lunedi alle 07:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Esegui senza pubblicare (true/false)'
        required: false
        default: 'false'

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Genera digest
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER || 'agic-sandbox' }}
          OWNER_TYPE: ${{ vars.OWNER_TYPE || 'organization' }}
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          node scripts/project-digest.mjs $DRY
